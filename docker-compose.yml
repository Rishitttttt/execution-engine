services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ocee
      POSTGRES_USER: ocee
      POSTGRES_PASSWORD: ocee
    ports:
      - "5432:5432"
    volumes:
      - ocee-pg:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
      args:
        DOCKER_GID: ${DOCKER_GID:-999}
    user: root
    environment:
      OCEE_REDIS_URL: redis://redis:6379
      SPRING_PROFILES_ACTIVE: docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      OCEE_REDIS_URL: redis://redis:6379
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ocee
      SPRING_DATASOURCE_USERNAME: ocee
      SPRING_DATASOURCE_PASSWORD: ocee
    ports:
      - "8081:8080"
    depends_on:
      - postgres
      - redis
  image-builder:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /src
    volumes:
      - .:/src
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.m2:/root/.m2
    command: mvn -pl worker pre-integration-test
    profiles: ["bootstrap"]
volumes:
  ocee-pg: {}
